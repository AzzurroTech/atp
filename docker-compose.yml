version: '3.8'

services:
  atp:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      # Optional: Persist data if you add a file-based storage later
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3